<!DOCTYPE html>

    <meta charset="UTF-8" />

    <!-- ── Twitter / X ── -->

    <!-- ── Structured Data: WebApplication ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "EatBC",
      "alternateName": ["Eat Better Change", "EatBC App"],

      "operatingSystem": "Any",
      "browserRequirements": "Requires a modern browser with JavaScript enabled",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "featureList": [
        "Personalised Indian diet plan",
        "Calorie and protein tracker",
        "Food diary with 500+ Indian foods",
        "Streak tracking and gamification",
        "Workout plan generator",
        "Community leaderboard",
        "Barcode food scanner",
        "AI food photo scan",
        "Body measurement tracker",
        "CSV data export"
      ],
      "screenshot": "https://eatbc.in/opengraph.jpg",
      "inLanguage": ["en-IN", "hi"],
      "audience": {
        "@type": "Audience",
        "geographicArea": {
          "@type": "Country",
          "name": "India"
        }
      }
    }

    <script type="application/ld+json">
